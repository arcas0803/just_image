name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────
  # Rust: lint + test
  # ─────────────────────────────────────
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/just_image/src/native
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/just_image/src/native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/just_image/src/native/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release

  # ─────────────────────────────────────
  # Dart: analyze + test (monorepo)
  # ─────────────────────────────────────
  dart-check:
    name: Dart Analyze & Test
    needs: rust-check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust native library
        working-directory: packages/just_image/src/native
        run: cargo build --release

      - name: Install dependencies (workspace)
        run: dart pub get

      - name: Analyze all packages
        run: |
          cd packages/just_image && dart analyze --fatal-infos && cd ../..
          cd packages/just_image_cli && dart analyze --fatal-infos && cd ../..

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Test just_image
        working-directory: packages/just_image
        run: dart test
        env:
          LD_LIBRARY_PATH: src/native/target/release
          DYLD_LIBRARY_PATH: src/native/target/release

      - name: Test just_image_cli
        working-directory: packages/just_image_cli
        run: dart test

  # ─────────────────────────────────────
  # Flutter: analyze + test
  # ─────────────────────────────────────
  flutter-check:
    name: Flutter Analyze & Test
    needs: rust-check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: packages/just_image_flutter
        run: flutter pub get

      - name: Analyze
        working-directory: packages/just_image_flutter
        run: flutter analyze

      - name: Test
        working-directory: packages/just_image_flutter
        run: flutter test

  # ─────────────────────────────────────
  # Dry-run publish
  # ─────────────────────────────────────
  publish-dry-run:
    name: Publish Dry Run
    needs: [dart-check, flutter-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - run: dart pub get

      - name: Dry run - just_image
        working-directory: packages/just_image
        run: dart pub publish --dry-run

      - name: Dry run - just_image_cli
        working-directory: packages/just_image_cli
        run: dart pub publish --dry-run
