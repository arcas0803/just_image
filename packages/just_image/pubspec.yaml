name: just_image
description: >-
  High-performance image processing engine powered by Rust FFI.
  Supports AVIF, WebP, JPEG, PNG, TIFF, BMP with zero-copy
  memory, SIMD acceleration, and professional metadata preservation.
version: 1.0.0
repository: https://github.com/just-image/just_image
homepage: https://github.com/just-image/just_image
topics:
  - image
  - image-processing
  - ffi
  - rust

resolution: workspace

environment:
  sdk: ^3.10.8

dependencies:
  ffi: ^2.2.0
  logging: ^1.3.0
  native_assets_cli: ^0.18.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
